{% extends 'app01/base.html' %}
{% load static %}

{% block title %}健康小贴士 · LingShu-AI{% endblock %}

{% block content %}
<div class="container" style="padding:40px 0">
    <div class="text-center mb-5">
        <div class="section-divider mx-auto"></div>
        <h1 class="section-title">健康小贴士</h1>
        <p class="section-sub">来自专业健康数据平台的日常健康指导</p>
    </div>

    <!-- 城市天气 -->
    <div class="dm-card p-4 mb-4">
        <div class="row align-items-center">
            <div class="col-md-6">
                <h5 style="font-family:'Noto Serif SC',serif;color:var(--primary);margin-bottom:12px">
                    <i class="fa fa-cloud-sun me-2" style="color:var(--accent)"></i>城市实时天气
                </h5>
                <div style="display:flex;gap:10px">
                    <input type="text" id="city-input" class="form-control"
                           placeholder="输入城市名，如：北京" value=""
                           style="border-radius:8px;border-color:var(--border)">
                    <button class="btn-dm-accent" style="white-space:nowrap;padding:8px 20px;border-radius:8px"
                            onclick="queryWeather()">查询
                    </button>
                </div>
            </div>
            <div class="col-md-6 mt-3 mt-md-0" id="weather-result" style="display:none">
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px">
                    <div style="text-align:center;padding:12px;background:#f0f8ff;border-radius:10px;border:1px solid var(--border)">
                        <div style="font-size:1.3rem;font-weight:700;color:var(--accent)" id="w-temp">--</div>
                        <div style="font-size:.75rem;color:var(--text-muted)">温度(°C)</div>
                    </div>
                    <div style="text-align:center;padding:12px;background:#f0f8ff;border-radius:10px;border:1px solid var(--border)">
                        <div style="font-size:1rem;font-weight:700;color:var(--primary)" id="w-weather">--</div>
                        <div style="font-size:.75rem;color:var(--text-muted)">天气</div>
                    </div>
                    <div style="text-align:center;padding:12px;background:#f0f8ff;border-radius:10px;border:1px solid var(--border)">
                        <div style="font-size:1rem;font-weight:700;color:var(--success)" id="w-humidity">--</div>
                        <div style="font-size:.75rem;color:var(--text-muted)">湿度(%)</div>
                    </div>
                </div>
                <div style="font-size:.82rem;color:var(--text);background:#f0f8ff;border-radius:8px;padding:10px;border:1px solid var(--border)"
                     id="w-suggest"></div>
                <div style="font-size:.72rem;color:var(--text-muted);margin-top:6px" id="w-time"></div>
            </div>
        </div>
    </div>

    <!-- 贴士列表 -->
    <div id="tips-container">
        <div style="text-align:center;padding:40px">
            <div class="dm-spinner mb-3"></div>
            <div style="color:var(--text-muted);font-size:.88rem">加载健康贴士中...</div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 加载贴士
function loadTips(weather = '', temperature = '', area = '') {
    const params = new URLSearchParams({ weather, temperature, area });
    document.getElementById('tips-container').innerHTML = `
        <div style="text-align:center;padding:40px">
            <div class="dm-spinner mb-3"></div>
            <div style="color:var(--text-muted);font-size:.88rem">
                根据${area || '当前'}天气生成健康建议中...
            </div>
        </div>
    `;
    fetch(`/get_tips/?${params}`)
        .then(r => r.json())
        .then(data => {
            if (data.code === 200 && data.result) {
                const tips = Array.isArray(data.result) ? data.result : Object.values(data.result);
                document.getElementById('tips-container').innerHTML = `
                    <div class="row g-3">
                        ${tips.map((t, i) => `
                            <div class="col-md-6">
                                <div class="dm-card p-4" style="height:100%">
                                    <div style="display:flex;gap:14px;align-items:flex-start">
                                        <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--primary));color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0">${i+1}</div>
                                        <div>
                                            <div style="font-weight:600;font-size:.9rem;color:var(--primary);margin-bottom:6px">${t.title || '健康贴士'}</div>
                                            <div style="font-size:.83rem;color:var(--text-muted);line-height:1.7">${t.content || ''}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        })
        .catch(() => {});
}

// 页面加载时先用默认贴士
loadTips();

// 空气质量查询
async function queryWeather() {
    const city = document.getElementById('city-input').value.trim() || '北京';

    // 重置显示
    document.getElementById('w-suggest').textContent = '正在获取天气数据...';
    document.getElementById('weather-result').style.display = 'block';
    document.getElementById('w-temp').textContent = '--';
    document.getElementById('w-weather').textContent = '--';
    document.getElementById('w-humidity').textContent = '--';
    document.getElementById('w-suggest').textContent = '加载中...';
    document.getElementById('w-time').textContent = '';

    try {
        // 第一步：先获取天气数据（快，秒级返回）
        const weatherResp = await fetch(`/air/data/?area=${encodeURIComponent(city)}`);
        const weatherData = await weatherResp.json();

        if (weatherData.code !== 200 || !weatherData.result?.length) {
            document.getElementById('w-suggest').textContent = weatherData.msg || '查询失败';
            return;
        }

        const r = weatherData.result[0];

        // 立即更新天气数据
        document.getElementById('w-temp').textContent = r.temperature ?? '--';
        document.getElementById('w-weather').textContent = r.weather ?? '--';
        document.getElementById('w-humidity').textContent = r.humidity ?? '--';
        document.getElementById('w-time').textContent = r.reporttime ? `更新时间：${r.reporttime}` : '';
        document.getElementById('w-suggest').innerHTML =
            '<span style="color:var(--text-muted);font-size:.8rem">⏳ AI 正在生成健康建议...</span>';

        // 第二步：异步获取 AI 建议（慢，不阻塞天气显示）
        const params = new URLSearchParams({
            area: r.area,
            weather: r.weather,
            temperature: r.temperature,
            humidity: r.humidity,
            winddirection: r.winddirection,
            windpower: r.windpower,
        });

        fetch(`/weather/suggest/?${params}`)
            .then(res => res.json())
            .then(suggestData => {
                document.getElementById('w-suggest').textContent =
                    suggestData.suggest || '请注意天气变化，保持健康生活习惯。';
            })
            .catch(() => {
                document.getElementById('w-suggest').textContent = '请注意天气变化，适时增减衣物。';
            });

    } catch (e) {
        document.getElementById('w-suggest').textContent = '网络错误，请稍后重试';
    }
}

// 页面加载时默认查询
queryWeather();
// 在 queryWeather() 里，获取到天气数据后加这几行
const r = weatherData.result[0];

// 立即更新天气显示（原有代码不变）
document.getElementById('w-temp').textContent = r.temperature ?? '--';
document.getElementById('w-weather').textContent = r.weather ?? '--';
document.getElementById('w-humidity').textContent = r.humidity ?? '--';
document.getElementById('w-time').textContent = r.reporttime ? `更新时间：${r.reporttime}` : '';

// ↓ 新增：根据天气重新加载贴士
loadTips(r.weather, r.temperature, r.area);
</script>
{% endblock %}
